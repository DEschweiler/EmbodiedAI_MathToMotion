<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embodied AI — From Math to Motion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      },
      chtml: { scale: 1.0 }
    };
  </script>
  <script id="mathjax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-dot"></div>
        <div>
          <div class="brand-title">Embodied AI</div>
          <div class="brand-sub">From Math to Motion</div>
        </div>
      </div>
      <div class="search">
        <input id="search" type="search" placeholder="Search title, tags, goals" aria-label="Search posts" />
      </div>
      <div class="post-list" id="post-list"></div>
    </aside>

    <main class="reader">
      <div class="reader-header">
        <div>
          <h1 id="post-title">Loading…</h1>
          <p class="summary" id="post-summary"></p>
          <div class="tag-list" id="tag-list"></div>
        </div>
        <div class="nav-buttons">
          <button id="prev-post" aria-label="Previous post">← Previous</button>
          <button id="next-post" aria-label="Next post">Next →</button>
        </div>
      </div>
      <article id="post-content" class="content">Loading content…</article>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
